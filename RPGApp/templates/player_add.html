
{% extends 'base.html' %}

    {% block title %}Player Form Page{% endblock %}
    {% block header %}Welcome to Player Form Page{% endblock %}

    {% block content %}
    <!-- Insert page contents here -->
    <div class="container mt-4">
        <div class="Player-form">

            <div class="Player_header_form d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h3 class="mb-0">Player Record</h3>
            </div>

            <div class="Player_body_form mx-auto">
                <form method="post" class="container">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            {{ form.player_firstname }}
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            {{ form.player_surname }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        {{ form.player_username }}

                    </div>

                    <button type="submit" class="button-pa"
                        {% if is_edit %}onclick="return confirm('Save changes to this Player record?');"{% endif %}>
                        {% if is_edit %}Save Changes{% else %}Submit Form{% endif %}
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}
